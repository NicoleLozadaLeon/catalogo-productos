services:
  # ── Base de datos PostgreSQL (contenedor propio, NO usa el de Windows) ──
  postgres:
    image: postgres:15-alpine
    container_name: catalogo_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      # Credencial de un contenedor local efímero (NO es un secreto de producción).
      # Se puede sobreescribir exportando DB_PASSWORD; el default permite `docker compose up`
      # sin configurar nada. En producción (EC2) la contraseña viene de Parameter Store.
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB:       catalogo
    ports:
      - "5434:5432"   # puerto 5434 en host para no chocar con el PG de Windows (5433)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d catalogo"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Aplicación Express ─────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: catalogo_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:    production
      PORT:        3000
      DB_HOST:     postgres      # nombre del servicio = hostname dentro de la red Docker
      DB_PORT:     5432          # puerto DENTRO de la red Docker (no el del host)
      DB_NAME:     catalogo
      DB_USER:     postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}   # debe coincidir con POSTGRES_PASSWORD de arriba
      USE_S3:      "false"
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads   # persistir imágenes subidas

volumes:
  postgres_data:
  uploads_data:
